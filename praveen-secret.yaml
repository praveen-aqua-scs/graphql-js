rules:
  - id: admin-password-assignment
    category: credential
    title: Hardcoded admin password in IaC
    severity: HIGH
    # matches: admin_password = "xxxxx"
    regex: (?i)admin_?password\s*=\s*["'](?P<secret>[^"'\n]{8,})["']

  - id: env-secret-in-echo
    category: credential
    title: Secret in env var echoed into files (/etc/environment)
    severity: HIGH
    # matches: echo "DB_PASSWORD=HardCodedPassword123!"
    regex: (?i)echo\s+["'](?P<key>(?:db[_-]?password|api[_-]?key|secret[_-]?key|access[_-]?token|token|password|passwd|pwd))\s*=\s*(?P<secret>[^"']{8,})["']

  - id: env-secret-export
    category: credential
    title: Secret exported as shell environment variable
    severity: HIGH
    # matches: export SECRET_KEY=AnotherSuperSecret456#
    regex: (?i)\bexport\s+(?P<key>(?:db[_-]?password|api[_-]?key|secret[_-]?key|access[_-]?token|token|password|passwd|pwd))\s*=\s*["']?(?P<secret>[^"'\s\\]{8,})["']?

  - id: pem-private-key
    category: key
    title: Embedded PEM private key
    severity: CRITICAL
    # RE2-safe: dot-all, no large {m,n} bounds, capture the whole block
    regex: (?is)(?P<secret>-----BEGIN (?:[A-Z ]+)?PRIVATE KEY-----\r?\n.*\r?\n-----END (?:[A-Z ]+)?PRIVATE KEY-----)

  - id: generic-kv-secret
    category: credential
    title: Generic key=value style secret (fallback)
    severity: HIGH
    regex: (?i)(?P<key>(?:password|passwd|pwd|secret|token|api[_-]?key))\s*[:=]\s*["']?(?P<secret>[^"'\s]{8,})["']?

allow-rules:
  - id: ssh-public-key
    description: skip SSH public keys (not secrets)
    regex: (?:^|["'\s])ssh-rsa\s+[A-Za-z0-9+/=]{40,}

disable-rules:
  - slack-access-token
  - slack-web-hook

disable-allow-rules:
  - markdown
