name: Aqua
on: [pull_request, push]

jobs:
  aqua:
    name: Aqua scanner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Aqua scanner (Trivy)
        uses: docker://aquasec/aqua-scanner:latest
        
        with:
          args: >-
            trivy fs
            --debug
            --sast
            --reachability
            --package-json
            --scanners misconfig,vuln,secret
            --secret-config trivy-secret.yaml 
            --db-repository=registry.aquasec.com/trivy-db:2
            --checks-bundle-repository=registry.aquasec.com/trivy-checks:1
            --java-db-repository=registry.aquasec.com/trivy-java-db:1
            .

          # To customize which severities to scan for, add the following flag: --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          # To enable SAST scanning, add: --sast
          # To enable reachability scanning, add: --reachability
          # To enable npm/dotnet/gradle non-lock file scanning, add: --package-json / --dotnet-proj / --gradle
        env:
          TRIVY_LOG_LEVEL: DEBUG
          AQUA_KEY: ${{ secrets.AQUA_KEY }}
          AQUA_SECRET: ${{ secrets.AQUA_SECRET }}
          GITHUB_TOKEN: ${{ github.token }}
          TRIVY_RUN_AS_PLUGIN: 'aqua'
          ACTIONS_RUNTIME_TOKEN: ${{ secrets.TOKEN }}   
          TRIVY_USERNAME: ${{ secrets.TRIVY_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.TRIVY_PASSWORD }} 
          # For http/https proxy configuration add env vars: HTTP_PROXY/HTTPS_PROXY, CA-CRET (path to CA certificate)
