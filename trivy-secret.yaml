rules:
  - id: admin-password-assignment
    category: credential
    title: Hardcoded admin password in IaC
    severity: HIGH
    keywords: ["admin_password", "admin password"]
    regex: (?i)\b(?P<key>admin_?password)\b\s*=\s*["'](?P<secret>[^"'\n]{8,})["']

  - id: env-secret-assignment
    category: credential
    title: Secret in environment variable / bootstrap (user_data)
    severity: HIGH
    keywords: ["DB_PASSWORD", "API_KEY", "SECRET_KEY", "export", "/etc/environment"]
    regex: (?i)\b(?:export\s+)?(?P<key>(?:db[_-]?password|api[_-]?key|secret[_-]?key|access[_-]?token|token|password|passwd|pwd))\b\s*=\s*["']?(?P<secret>[^"'\s\\]{8,})["']?

  - id: pem-private-key
    category: key
    title: Embedded PEM private key
    severity: CRITICAL
    keywords: ["PRIVATE KEY", "BEGIN", "END"]
    regex: (?i)-----BEGIN (?:[A-Z ]+)?PRIVATE KEY-----[\r\n]+(?P<secret>[\s\S]{32,20000}?)[\r\n]+-----END (?:[A-Z ]+)?PRIVATE KEY-----

  - id: generic-kv-secret
    category: credential
    title: Generic key=value style secret
    severity: HIGH
    keywords: ["password", "secret", "token", "apikey", "api_key", "api-key"]
    regex: (?i)\b(?P<key>(?:password|passwd|pwd|secret|token|api[_-]?key))\b\s*[:=]\s*["']?(?P<secret>[^"'\s]{8,})["']?

allow-rules:
  - id: ssh-public-key
    description: skip SSH public keys (not secrets)
    regex: (?:^|["'\s])ssh-rsa\s+[A-Za-z0-9+/=]{40,}

  - id: social-security-number
    description: skip social security number example
    regex: 219-09-9999

  - id: log-dir
    description: skip log directory
    path: ^/var/log/

disable-rules:
  - slack-access-token
  - slack-web-hook

disable-allow-rules:
  - markdown
