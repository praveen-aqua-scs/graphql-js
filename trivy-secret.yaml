rules:
  - id: admin-password-assignment
    category: credential
    title: Hardcoded admin password in IaC
    severity: HIGH
    keywords: ["admin_password", "admin password"]
    # HCL style: admin_password = "xxxxx"
    regex: (?i)admin_?password\s*=\s*["'](?P<secret>[^"'\n]{8,})["']

  - id: env-secret-in-echo
    category: credential
    title: Secret in env var echoed into files (e.g., /etc/environment)
    severity: HIGH
    keywords: ["echo", "/etc/environment", "DB_PASSWORD", "API_KEY", "SECRET_KEY"]
    # Matches: echo "DB_PASSWORD=HardCodedPassword123!" >> /etc/environment
    # Allows single/double quotes; captures value up to the closing quote
    regex: (?i)echo\s+["'](?P<key>(?:db[_-]?password|api[_-]?key|secret[_-]?key|access[_-]?token|token|password|passwd|pwd))\s*=\s*(?P<secret>[^"']{8,})["']

  - id: env-secret-export
    category: credential
    title: Secret exported as shell environment variable
    severity: HIGH
    keywords: ["export", "DB_PASSWORD", "API_KEY", "SECRET_KEY"]
    # Matches: export SECRET_KEY=AnotherSuperSecret456#
    regex: (?i)\bexport\s+(?P<key>(?:db[_-]?password|api[_-]?key|secret[_-]?key|access[_-]?token|token|password|passwd|pwd))\s*=\s*["']?(?P<secret>[^"'\s\\]{8,})["']?

  - id: generic-kv-secret
    category: credential
    title: Generic key=value style secret
    severity: HIGH
    keywords: ["password", "secret", "token", "apikey", "api_key", "api-key"]
    # Generic fallback for key=value anywhere (handles quotes too)
    regex: (?i)(?P<key>(?:password|passwd|pwd|secret|token|api[_-]?key))\s*[:=]\s*["']?(?P<secret>[^"'\s]{8,})["']?

  - id: pem-private-key
    category: key
    title: Embedded PEM private key
    severity: CRITICAL
    keywords: ["PRIVATE KEY", "BEGIN", "END"]
    regex: (?i)-----BEGIN (?:[A-Z ]+)?PRIVATE KEY-----[\r\n]+(?P<secret>[\s\S]{32,20000}?)[\r\n]+-----END (?:[A-Z ]+)?PRIVATE KEY-----

allow-rules:
  - id: ssh-public-key
    description: skip SSH public keys (not secrets)
    regex: (?:^|["'\s])ssh-rsa\s+[A-Za-z0-9+/=]{40,}

  - id: social-security-number
    description: skip social security number example
    regex: 219-09-9999

  - id: log-dir
    description: skip log directory
    path: ^/var/log/

disable-rules:
  - slack-access-token
  - slack-web-hook

disable-allow-rules:
  - markdown
